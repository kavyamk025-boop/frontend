<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youtube</title>
    <style>
        .thumbnail{
            width:300px;
            height: 300px;
            object-fit:contain;
            border-style:solid;
            border-color: red;
            object-position: right;
        }
        .search-bar{
            text-align: left;
            border-radius: 20px;
            padding-left: 20px;
            position: left;
        }
        .linea{
            text-align: left;
            background-color: blueviolet;
            text-decoration: dotted;
            text-decoration-color: brown;
            line-height: 20px;
            -webkit-text-stroke-width: 0cap;
        }
        .linea.hover{
            background-color: black;
            
        }
        .video-author{
            display: inline-block;
        }
        .video-stats{
            display: inline-block;
        }
    </style>
</head>
<body>
    <input class="search-bar" type="text" placeholder="search">
   <img class="thumbnail"  src="https://images.unsplash.com/photo-1504203772830-87fba72385ee?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTF8fGJveXxlbnwwfHwwfHx8MA%3D%3D" alt="image will surely come.."> 
<p class="linea">completing every wish of mine with myself that makes me feel alive</p>
<p class="video-author">line line line</p>
<p class="video-stats">3.4M 6dys ago</p>
</body>
</html>
